# Render Configuration
# Note: Due to Render's blueprint limitations, we recommend manual deployment
# See RENDER_QUICK_DEPLOY.md for step-by-step instructions

# For Backend Service
backend:
  buildCommand: cd backend/ElsaWorkflow.Api && dotnet publish -c Release
  startCommand: ./out/ElsaWorkflow.Api
  env: dotnet
  envVars:
    ASPNETCORE_ENVIRONMENT: Production
    ASPNETCORE_URLS: http://0.0.0.0:10000
    JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    CORS_ALLOWED_ORIGINS: ${FRONTEND_URL}

# For Frontend Service
frontend:
  buildCommand: cd frontend && npm install && npm run build
  startCommand: npx serve -s dist -l 3000
  env: node
  publicDir: frontend/dist
  envVars:
    VITE_API_URL: ${BACKEND_URL}/api
    VITE_SIGNALR_URL: ${BACKEND_URL}
